name: Electron distribution

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test:unit

  runtime-invariants:
    name: Runtime invariants
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend test dependencies
        run: python -m pip install -e "backend[dev]"

      - name: Run backend runtime/package invariants
        run: python -m pytest backend/tests/test_runtime_installers.py -v

  build-installers:
    name: ${{ matrix.os }}
    needs: [frontend-checks, runtime-invariants]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: voice-diary-windows-installer
            expected_extensions: '[".exe"]'
            artifact_paths: |
              frontend/dist-app/*.exe
              frontend/dist-app/*.blockmap
          - os: macos-latest
            artifact_name: voice-diary-macos-dmg
            expected_extensions: '[".dmg"]'
            artifact_paths: |
              frontend/dist-app/*.dmg
              frontend/dist-app/*.blockmap
          - os: ubuntu-latest
            artifact_name: voice-diary-linux-installers
            expected_extensions: '[".AppImage", ".deb"]'
            artifact_paths: |
              frontend/dist-app/*.AppImage
              frontend/dist-app/*.deb
              frontend/dist-app/*.blockmap

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build installable Electron app
        working-directory: frontend
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_BUILDER_DISABLE_UPDATE_CHECK: "true"
        run: npm run electron:build

      - name: Verify installable artifacts
        shell: node {0}
        env:
          EXPECTED_EXTENSIONS: ${{ matrix.expected_extensions }}
        run: |
          const fs = require('fs')
          const path = require('path')

          const distDir = path.join('frontend', 'dist-app')
          const minBytes = 50 * 1024 * 1024
          const expectedExtensions = JSON.parse(process.env.EXPECTED_EXTENSIONS)
          const files = fs.readdirSync(distDir).map((name) => {
            const fullPath = path.join(distDir, name)
            return { name, fullPath, stat: fs.statSync(fullPath) }
          })

          for (const extension of expectedExtensions) {
            const matches = files.filter((file) => (
              file.stat.isFile() && file.name.endsWith(extension)
            ))
            if (matches.length === 0) {
              throw new Error(`Missing installer artifact with extension ${extension}`)
            }
            for (const match of matches) {
              if (match.stat.size < minBytes) {
                throw new Error(
                  `Installer artifact is unexpectedly small: ${match.fullPath} (${match.stat.size} bytes)`,
                )
              }
            }
          }

      - name: Upload installable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 90 || 14 }}

      - name: Upload builder diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voice-diary-builder-diagnostics-${{ matrix.os }}
          path: |
            frontend/dist-app/builder-debug.yml
            frontend/dist-app/*.yml
            frontend/dist-app/*.yaml
          if-no-files-found: ignore
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 90 || 14 }}

  build-mcp:
    name: MCP sidecar (${{ matrix.os }})
    needs: runtime-invariants
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: voice-diary-mcp-windows
            binary_name: voice-diary-mcp-windows-x64
            extension: .exe
          - os: macos-latest
            artifact_name: voice-diary-mcp-macos
            binary_name: voice-diary-mcp-macos
            extension: ""
          - os: ubuntu-latest
            artifact_name: voice-diary-mcp-linux
            binary_name: voice-diary-mcp-linux-x64
            extension: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MCP build dependencies
        run: python -m pip install -e backend "mcp[cli]>=1.20,<2" pyinstaller

      - name: Build standalone MCP sidecar
        shell: bash
        run: >-
          python -m PyInstaller
          --clean
          --onefile
          --name "${{ matrix.binary_name }}"
          --paths .
          --collect-all mcp
          scripts/mcp-entry.py

      - name: Verify MCP sidecar
        shell: python
        env:
          MCP_BINARY: dist/${{ matrix.binary_name }}${{ matrix.extension }}
        run: |
          import os
          import pathlib
          import subprocess
          import asyncio

          from mcp import ClientSession, StdioServerParameters
          from mcp.client.stdio import stdio_client

          binary = pathlib.Path(os.environ["MCP_BINARY"])
          minimum_size = 5 * 1024 * 1024
          if not binary.is_file():
              raise SystemExit(f"Missing MCP sidecar: {binary}")
          if binary.stat().st_size < minimum_size:
              raise SystemExit(
                  f"MCP sidecar is unexpectedly small: {binary.stat().st_size} bytes"
              )
          result = subprocess.run(
              [str(binary.resolve()), "--help"],
              check=True,
              capture_output=True,
              text=True,
          )
          if "Voice Diary read-only MCP server" not in result.stdout:
              raise SystemExit("MCP sidecar help output is invalid")

          async def verify_protocol() -> None:
              parameters = StdioServerParameters(command=str(binary.resolve()), args=[])
              async with stdio_client(parameters) as (read, write):
                  async with ClientSession(read, write) as session:
                      await session.initialize()
                      tools = await session.list_tools()
                      names = {tool.name for tool in tools.tools}
                      expected = {"search_transcripts", "search_diary"}
                      if names != expected:
                          raise SystemExit(f"Unexpected MCP tools: {sorted(names)}")

          asyncio.run(verify_protocol())

      - name: Upload MCP sidecar
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.binary_name }}${{ matrix.extension }}
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 90 || 14 }}

  publish-release:
    name: Publish GitHub release
    needs: [build-installers, build-mcp]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: voice-diary-windows-installer
          path: release-assets

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: voice-diary-macos-dmg
          path: release-assets

      - name: Download Linux installers
        uses: actions/download-artifact@v4
        with:
          name: voice-diary-linux-installers
          path: release-assets

      - name: Download Windows MCP sidecar
        uses: actions/download-artifact@v4
        with:
          name: voice-diary-mcp-windows
          path: release-assets

      - name: Download macOS MCP sidecar
        uses: actions/download-artifact@v4
        with:
          name: voice-diary-mcp-macos
          path: release-assets

      - name: Download Linux MCP sidecar
        uses: actions/download-artifact@v4
        with:
          name: voice-diary-mcp-linux
          path: release-assets

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            directory=${file%/*}
            filename=${file##*/}
            normalized_filename=${filename// /.}
            if [[ "$filename" != "$normalized_filename" ]]; then
              mv -- "$file" "$directory/$normalized_filename"
            fi
          done < <(find release-assets -maxdepth 1 -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' -o -name 'voice-diary-mcp-*' \) -print0)
          cd release-assets
          mapfile -d '' release_files < <(find . -maxdepth 1 -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' -o -name 'voice-diary-mcp-*' \) -print0 | sort -z)
          test "${#release_files[@]}" -gt 0
          sha256sum "${release_files[@]}" > SHA256SUMS.txt
          test -s SHA256SUMS.txt

      - name: Validate release assets
        shell: bash
        run: |
          test -n "$(find release-assets -maxdepth 1 -type f -name '*.exe' ! -name 'voice-diary-mcp-*' -print -quit)"
          test -n "$(find release-assets -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          test -n "$(find release-assets -maxdepth 1 -type f -name '*.AppImage' -print -quit)"
          test -n "$(find release-assets -maxdepth 1 -type f -name '*.deb' -print -quit)"
          test -f release-assets/voice-diary-mcp-windows-x64.exe
          test -f release-assets/voice-diary-mcp-macos
          test -f release-assets/voice-diary-mcp-linux-x64
          (cd release-assets && sha256sum -c SHA256SUMS.txt)

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_IS_PRERELEASE: ${{ contains(github.ref_name, '-alpha.') || contains(github.ref_name, '-beta.') || contains(github.ref_name, '-rc.') }}
        run: |
          release_files=(release-assets/*)
          notes_file="docs/releases/${GITHUB_REF_NAME}.md"
          test -f "$notes_file"
          release_options=(
            --title "Voice Diary $GITHUB_REF_NAME"
            --notes-file "$notes_file"
          )
          if [[ "$RELEASE_IS_PRERELEASE" == "true" ]]; then
            release_options+=(--prerelease)
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" "${release_options[@]}"
            gh release upload "$GITHUB_REF_NAME" "${release_files[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${release_options[@]}" "${release_files[@]}"
          fi
