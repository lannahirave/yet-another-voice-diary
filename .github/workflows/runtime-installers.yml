name: Runtime installers

on:
  push:
    paths:
      - ".github/workflows/runtime-installers.yml"
      - "backend/pyproject.toml"
      - "backend/tests/test_runtime_installers.py"
      - "frontend/electron/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "scripts/install.bat"
      - "scripts/install-nemo.bat"
      - "scripts/install.sh"
      - "scripts/runtime-install.ps1"
      - "scripts/runtime-install.sh"
  pull_request:
    paths:
      - ".github/workflows/runtime-installers.yml"
      - "backend/pyproject.toml"
      - "backend/tests/test_runtime_installers.py"
      - "frontend/electron/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "scripts/install.bat"
      - "scripts/install-nemo.bat"
      - "scripts/install.sh"
      - "scripts/runtime-install.ps1"
      - "scripts/runtime-install.sh"
  workflow_dispatch:

jobs:
  verify-runtime-installers:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python test runner
        run: python -m pip install pytest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run runtime installer invariant tests
        run: python -m pytest backend/tests/test_runtime_installers.py -v

      - name: Parse PowerShell runtime installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/scripts/runtime-install.ps1",
            [ref]$tokens,
            [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | Format-List
            exit 1
          }

      - name: Parse Unix runtime installers
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bash -n scripts/runtime-install.sh
          bash -n scripts/install.sh

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Compile Electron main process
        working-directory: frontend
        run: npm run electron:compile

      - name: Build unpacked Electron app
        working-directory: frontend
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --dir

      - name: Verify packaged runtime resources
        working-directory: frontend
        shell: node {0}
        run: |
          const fs = require('fs')
          const path = require('path')

          function walk(dir, matches = []) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name)
              if (entry.isDirectory()) {
                walk(fullPath, matches)
              } else {
                matches.push(fullPath)
              }
            }
            return matches
          }

          const files = walk('dist-app').map((file) => file.replaceAll(path.sep, '/'))
          const requiredSuffixes = [
            '/resources/scripts/runtime-install.ps1',
            '/resources/scripts/runtime-install.sh',
            '/resources/backend/pyproject.toml',
          ]

          for (const suffix of requiredSuffixes) {
            if (!files.some((file) => file.endsWith(suffix))) {
              throw new Error(`Missing packaged resource: ${suffix}`)
            }
          }

      - name: Upload unpacked app artifact
        uses: actions/upload-artifact@v4
        with:
          name: voice-diary-${{ matrix.os }}-unpacked
          path: frontend/dist-app/**
          if-no-files-found: error
          retention-days: 14
